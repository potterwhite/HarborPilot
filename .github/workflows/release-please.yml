on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Create PR for PROJECT_RELEASE_DATE
        # Normal: uncomment the line below (release_created must be true).
        if: ${{ steps.release.outputs.release_created }}
        # TEMPORARY for manual CI test: comment above, uncomment below.
        # if: true
        uses: actions/github-script@v7
        with:
          script: |
            const releaseDate = new Date().toISOString().split('T')[0];
            // During workflow_dispatch (no real release), tag_name is undefined → use 'test-tag'.
            const tagName = '${{ steps.release.outputs.tag_name }}' || 'test-tag';
            const branchName = `release-date-${tagName}`;
            const filePath = 'configs/1_defaults/00_global.env';

            // Create a new branch from current SHA
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branchName}`,
              sha: context.sha
            });

            // Get current file content to obtain its SHA
            const { data: fileData } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              ref: branchName
            });

            // Update PROJECT_RELEASE_DATE in file content
            const content = Buffer.from(fileData.content, 'base64').toString();
            const newContent = content.replace(
              /^PROJECT_RELEASE_DATE=.*/m,
              `PROJECT_RELEASE_DATE=${releaseDate}`
            );

            // Commit the change to the new branch
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `chore: set PROJECT_RELEASE_DATE to ${releaseDate} for ${tagName}`,
              content: Buffer.from(newContent).toString('base64'),
              sha: fileData.sha,
              branch: branchName
            });

            // Create the pull request
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: set PROJECT_RELEASE_DATE to ${releaseDate} for ${tagName}`,
              head: branchName,
              base: 'main',
              body: [
                `Release date update for \`${tagName}\``,
                '',
                'Created by GitHub Actions — please review and merge.',
                '',
                '🤖 Generated with [Claude Code](https://claude.com/claude-code)'
              ].join('\n'),
              draft: false
            });

            console.log(`Created PR #${pr.data.number}: ${pr.data.title}`);

  upload-handover-tarballs:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build handover tarballs
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # Build one handover tarball per platform
          for platform_env in configs/2_platforms/*.env; do
            platform_name=$(basename "${platform_env}" .env)
            EXTERNAL_DEFINED_HANDOVER_DIR=/tmp ./harbor handover-platform "${platform_name}"
          done

      - name: Upload tarballs to release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "${TAG}" \
            /tmp/project_handover_*_v${VERSION}.tar.gz \
            --clobber
