on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Create PR for PROJECT_RELEASE_DATE
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          BRANCH_NAME="release-date-${TAG_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH_NAME}"
          sed -i "s/^PROJECT_RELEASE_DATE=.*/PROJECT_RELEASE_DATE=${RELEASE_DATE}/" \
            configs/1_defaults/00_global.env
          git add configs/1_defaults/00_global.env
          git commit -m "chore: set PROJECT_RELEASE_DATE to ${RELEASE_DATE} for ${TAG_NAME}"
          git push --set-upstream origin "${BRANCH_NAME}"

      - name: Create PR for PROJECT_RELEASE_DATE
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = process.env.TAG_NAME;
            const branchName = `release-date-${tagName}`;
            const releaseDate = new Date().toISOString().split('T')[0];

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: set PROJECT_RELEASE_DATE to ${releaseDate} for ${tagName}`,
              head: branchName,
              base: 'main',
              body: [
                `Release date update for \`${tagName}\``,
                '',
                'Created by GitHub Actions — please review and merge.',
                '',
                '🤖 Generated with [Claude Code](https://claude.com/claude-code)'
              ].join('\n'),
              draft: false
            });

            console.log(`Created PR #${pr.data.number}: ${pr.data.title}`);

  upload-handover-tarballs:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build handover tarballs
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # Build one handover tarball per platform
          for platform_env in configs/2_platforms/*.env; do
            platform_name=$(basename "${platform_env}" .env)
            dir="project_handover_${platform_name}_v${VERSION}"
            stage="/tmp/${dir}"

            mkdir -p "${stage}/project_handover/clientside/volumes"
            mkdir -p "${stage}/configs/1_defaults"
            mkdir -p "${stage}/configs/2_platforms"
            mkdir -p "${stage}/configs/3_hosts"
            mkdir -p "${stage}/scripts/lib"

            # Client scripts
            cp -r project_handover/clientside/ubuntu \
                  "${stage}/project_handover/clientside/ubuntu"
            rm -f "${stage}/project_handover/clientside/ubuntu/volumes"
            rm -f "${stage}/project_handover/clientside/ubuntu/docker-compose.yaml"
            touch "${stage}/project_handover/clientside/volumes/.gitkeep"

            # Config layers
            cp configs/1_defaults/*.env "${stage}/configs/1_defaults/"
            cp "${platform_env}" "${stage}/configs/2_platforms/"
            cp configs/3_hosts/TEMPLATE.env.example "${stage}/configs/3_hosts/"
            cp configs/3_hosts/README.md "${stage}/configs/3_hosts/"

            # Shared scripts
            cp scripts/port_calc.sh "${stage}/scripts/"
            cp scripts/lib/config.sh "${stage}/scripts/lib/"

            # Handover README (Chinese)
            cp project_handover/README_handover.md "${stage}/project_handover/"

            # Create tarball
            tar -czf "/tmp/${dir}.tar.gz" -C "${stage}" \
              "project_handover" "configs" "scripts"

            echo "Built: ${dir}.tar.gz"
          done

      - name: Upload tarballs to release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "${TAG}" \
            /tmp/project_handover_*_v${VERSION}.tar.gz \
            --clobber
